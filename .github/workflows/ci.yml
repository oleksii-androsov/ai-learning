name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Check out code
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install anthropic python-dotenv boto3 pinecone pypdf numpy faiss-cpu fastapi uvicorn

      - name: Check syntax
        run: |
          python -m py_compile week01-python-basics/hello_claude.py
          python -m py_compile week02-rag-pipeline/rag.py
          python -m py_compile week03-rag-v2/rag.py
          python -m py_compile week04-rag-api/api.py
          echo "All files passed syntax check."

  deploy:
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/ai-learning
            git pull
            sudo systemctl restart rag-api rag-streamlit
            for i in {1..12}; do
              curl -sf http://localhost:8000/health && break
              echo "Waiting for API to start (attempt $i/12)..."
              sleep 5
            done
            curl -sf http://localhost:8000/health || exit 1
            echo "Deployment successful."
